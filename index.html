<!doctype html>
<html lang="eng">
  <head>
    <title>GQ</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="The latest gorgeous GQ features." />
    <meta property="og:url" content="https://shoneal.github.io/gq/" />
    <meta property="og:title" content="GQ" />
    <meta
      property="og:description"
      content="The latest gorgeous GQ features."
    />
    <meta
      property="og:image"
      content="https://shoneal.github.io/gq/images/twitter-image.webp"
    />
    <meta property="og:site_name" content="GQ" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GQ" />
    <meta
      name="twitter:description"
      content="The latest gorgeous GQ features."
    />
    <meta
      name="twitter:image"
      content="https://shoneal.github.io/gq/images/twitter-image.webp"
    />
    <link
      rel="preload"
      as="image"
      href="https://shoneal.github.io/gq/images/twitter-image.webp"
      fetchpriority="high"
    />
    <link rel="icon" href="./images/favicon.ico" />
    <link rel="shortcut icon" href="./images/favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="./images/icon.png" />
    <link rel="apple-touch-icon-precomposed" href="./images/icon.png" />
    <link
      rel="preload"
      href="./fonts/GQSans-Bold.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="./fonts/fonts.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <script type="module" src="./scripts/covers.js"></script>
    <script type="module" src="./scripts/script.js"></script>
  </head>

  <body>
    <header class="header">
      <a class="logo-clickable logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 68">

          />
          <path
            d="M62.09 14.48c-.212-.301-.43-.598-.655-.9C56.378 6.85 47.59.016 33.942 0 17.902-.02 5.524 10.706 1.439 23.831c-.048.157-.096.318-.14.475-.005.008-.005.016-.009.024A33.5 33.5 0 0 0 0 33.568a36.2 36.2 0 0 0 1.154 8.772c2.577 9.58 9.278 17.483 18.106 21.725.073.032.141.068.213.1q.066.029.137.064c4.454 2.026 9.455 3.156 14.77 3.196A34.13 34.13 0 0 0 61.749 53.38c.129-.177.25-.358.374-.535a33.6 33.6 0 0 0 3.039-5.322 33.5 33.5 0 0 0 3.023-13.93c0-1.78-.14-3.525-.406-5.23H36.62v15.86h8.591c0 .385-4.406 4.667-11.015 4.667-7.272 0-15.501-5.741-15.666-14.94-.173-9.527 8.072-15.77 15.666-15.5 6.167.22 8.523 1.981 11.964 5.37l10.034.008h1.158c4.527.004 8.824.004 9.35.004a20 20 0 0 0-.63-1.962c-.796-2.106-2.099-4.715-3.98-7.389"
          />
        </svg>
      </a>
      <div class="years-wrapper">
        <div class="years">
          <a class="text-clickable text-clickable-main">all</a>
        </div>
      </div>
    </header>
    <main>
      <div class="summary-collection-wrapper">
        <div class="summary-collection"></div>
      </div>
    </main>
    <footer class="footer">
      <a class="logo"></a>
    </footer>

    <div class="popup">
      <div class="header">
        <a class="logo"></a>
      </div>
      <div class="popup-content">
        <div class="content-header">
          <picture class="content-header-image-picture">
            <source srcset="" media="(max-width: 767px)" />
            <source srcset="" media="(min-width: 768px)" />
            <img class="content-header-image" src="" alt="" />
          </picture>
          <div class="content-header-title">
            <time class="content-publish-date"></time>
            <h2 class="content-header-hed"></h2>
          </div>
        </div>
        <div class="content-wrapper">
          <div class="content-item">
            <img class="content-embed-wrapper" src="" alt="" loading="lazy" />
            <div class="group"></div>
          </div>
        </div>
        <div class="footer">
          <a class="logo"></a>
        </div>
      </div>
    </div>

    <template>
      <div class="summary-item">
        <div class="aspect-ratio-container">
          <img class="summary-item-image" src="" alt="" />
        </div>
        <div class="summary-item-content">
          <time class="summary-item-publish-date"></time>
          <h3 class="summary-item-hed"></h3>
        </div>
      </div>
    </template>
  </body>
</html>
